<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e0a2d"/>
      <stop offset="100%" stop-color="#09040e"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6508"/>
    </linearGradient>
    <filter id="crimsonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Rounded Corner Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <!-- Outer Runic Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.85"/>
  <circle cx="256" cy="256" r="204" fill="none" stroke="#991b1b" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="12 6" opacity="0.5"/>

  <!-- Mystic Eye / Instinct Crescent Logo -->
  <path d="M160,256 C160,180 220,130 256,130 C292,130 352,180 352,256 C352,332 292,382 256,382 C220,382 160,332 160,256 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.8"/>
  
  <!-- Crimson Glowing Eye Core -->
  <path d="M200,256 C220,230 240,220 256,220 C272,220 292,230 312,256 C292,282 272,292 256,292 C240,292 220,282 200,256 Z" fill="#991b1b" opacity="0.9"/>
  <circle cx="256" cy="256" r="22" fill="#ff2e2e" filter="url(#crimsonGlow)"/>
  <circle cx="262" cy="250" r="6" fill="#ffffff" opacity="0.9"/>

  <!-- Mystic Ritual Marks (Runes) -->
  <line x1="256" y1="50" x2="256" y2="100" stroke="url(#goldGrad)" stroke-width="4"/>
  <line x1="256" y1="412" x2="256" y2="462" stroke="url(#goldGrad)" stroke-width="4"/>
  <line x1="50" y1="256" x2="100" y2="256" stroke="url(#goldGrad)" stroke-width="4"/>
  <line x1="412" y1="256" x2="462" y2="256" stroke="url(#goldGrad)" stroke-width="4"/>
</svg>
